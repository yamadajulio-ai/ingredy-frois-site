<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="50%" stop-color="#C8A96E"/>
      <stop offset="100%" stop-color="#B0924F"/>
    </linearGradient>
  </defs>

  <!-- Clean background -->
  <circle cx="100" cy="100" r="98" fill="#FAFAF5"/>

  <!-- Outer ring - sage green -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#5B7B6F" stroke-width="2"/>

  <!-- Inner ring - gold accent -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gold)" stroke-width="0.6"/>

  <!-- Monogram "IF" - elegant serif -->
  <text x="100" y="122" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="normal" font-style="normal" letter-spacing="-4" fill="#5B7B6F">IF</text>

  <!-- Gold underline -->
  <line x1="60" y1="134" x2="140" y2="134" stroke="url(#gold)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Dot accents -->
  <circle cx="56" cy="134" r="1.8" fill="url(#gold)"/>
  <circle cx="144" cy="134" r="1.8" fill="url(#gold)"/>

  <!-- Top arc -->
  <path d="M 72 55 Q 100 45 128 55" fill="none" stroke="url(#gold)" stroke-width="0.6" stroke-linecap="round"/>
</svg>